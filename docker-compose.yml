version: '3.8'

services:
  video-downloader:
    build: .
    container_name: video-downloader
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DEBUG=false
      - SECRET_KEY=${SECRET_KEY:-change-this-secret-key}
      - AUTO_DELETE_ENABLED=${AUTO_DELETE_ENABLED:-false}
      - AUTO_DELETE_SECONDS=${AUTO_DELETE_SECONDS:-3600}
      - DOWNLOAD_FOLDER=/app/downloads
    volumes:
      - ./downloads:/app/downloads
      - ./app.py:/app/app.py
      - ./templates:/app/templates
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - video-downloader-network

networks:
  video-downloader-network:
    driver: bridge

volumes:
  downloads:
