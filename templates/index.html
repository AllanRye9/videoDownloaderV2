<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Video Downloader</title>
    
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #007AFF;
            --primary-dark: #0051D5;
            --success: #34C759;
            --danger: #FF3B30;
            --warning: #FF9500;
            --bg: #F2F2F7;
            --card: #FFFFFF;
            --text: #000000;
            --text-secondary: #8E8E93;
            --border: #E5E5EA;
        }
        
        @media (prefers-color-scheme: dark) {
            :root {
                --bg: #000000;
                --card: #1C1C1E;
                --text: #FFFFFF;
                --text-secondary: #98989D;
                --border: #38383A;
            }
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-font-smoothing: antialiased;
        }
        
        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 10px 14px;
        }
        
        .header {
            text-align: center;
            padding: 10px 0 8px;
        }
        
        .header h1 {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 2px;
        }
        
        .header p {
            color: var(--text-secondary);
            font-size: 12px;
        }
        
        .card {
            background: var(--card);
            border-radius: 12px;
            padding: 12px 14px;
            margin-bottom: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
        }
        
        .input-group {
            margin-bottom: 10px;
        }
        
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        input[type="text"],
        select {
            width: 100%;
            padding: 10px 12px;
            font-size: 15px;
            border: 1.5px solid var(--border);
            border-radius: 10px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
        }
        
        input[type="text"]:focus,
        select:focus {
            border-color: var(--primary);
        }
        
        .btn {
            width: 100%;
            padding: 11px;
            font-size: 14px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        
        .btn:active {
            transform: scale(0.98);
        }
        
        .btn-primary {
            background: var(--primary);
            color: white;
        }
        
        .btn-primary:hover {
            background: var(--primary-dark);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .btn-success {
            background: var(--success);
            color: white;
        }
        
        .btn-danger {
            background: var(--danger);
            color: white;
        }
        
        .btn-small {
            padding: 6px 12px;
            font-size: 13px;
            width: auto;
        }
        
        /* Compact animated video preview */
        .video-info {
            display: none;
            padding: 10px;
            border-radius: 10px;
            background: var(--bg);
            margin-bottom: 10px;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.25s ease, transform 0.25s ease;
        }
        
        .video-info.show {
            display: block;
        }

        .video-info.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .video-preview-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .video-info img {
            width: 100px;
            height: 62px;
            object-fit: cover;
            border-radius: 6px;
            flex-shrink: 0;
        }
        
        .video-meta {
            flex: 1;
            min-width: 0;
        }

        .video-info h3 {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .video-info p {
            color: var(--text-secondary);
            font-size: 12px;
            margin-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .downloads-list {
            margin-top: 12px;
        }
        
        .downloads-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .downloads-header h2 {
            font-size: 16px;
            font-weight: 700;
        }
        
        .download-item {
            background: var(--card);
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 8px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.04);
        }
        
        .download-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 5px;
        }
        
        .download-title {
            font-weight: 600;
            font-size: 13px;
            flex: 1;
            margin-right: 8px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .download-status {
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 11px;
            font-weight: 600;
            white-space: nowrap;
        }
        
        .status-queued {
            background: var(--warning);
            color: white;
        }
        
        .status-downloading {
            background: var(--primary);
            color: white;
        }
        
        .status-completed {
            background: var(--success);
            color: white;
        }
        
        .status-failed {
            background: var(--danger);
            color: white;
        }
        
        .download-progress {
            margin: 6px 0;
        }
        
        .progress-bar {
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: var(--primary);
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .progress-text {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 3px;
            display: flex;
            justify-content: space-between;
        }
        
        .download-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        
        .download-actions .btn {
            flex: 1;
        }
        
        .empty-state {
            text-align: center;
            padding: 24px 20px;
            color: var(--text-secondary);
        }
        
        .empty-state svg {
            width: 40px;
            height: 40px;
            margin-bottom: 8px;
            opacity: 0.4;
        }
        
        .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.6s linear infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .format-options {
            display: none;
        }
        
        .format-options.show {
            display: block;
        }
        
        .format-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 6px;
            margin-top: 6px;
        }
        
        .format-option {
            padding: 8px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--bg);
        }
        
        .format-option:hover,
        .format-option.selected {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }
        
        .format-resolution {
            font-weight: 600;
            font-size: 13px;
        }
        
        .format-size {
            font-size: 11px;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        
        .format-option.selected .format-size {
            color: rgba(255, 255, 255, 0.8);
        }
        
        @media (max-width: 640px) {
            .container {
                padding: 8px 10px;
            }
            
            .header h1 {
                font-size: 18px;
            }
            
            .download-actions {
                flex-direction: column;
            }
            
            .download-actions .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📥 Video Downloader</h1>
            <p>Download videos from YouTube, TikTok, and more</p>
        </div>
        
        <div class="card">
            <div class="input-group">
                <label for="videoUrl">Video URL</label>
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="Paste video URL here..."
                    autocomplete="off"
                    autocapitalize="off"
                    autocorrect="off"
                >
            </div>
            
            <button class="btn btn-primary" onclick="fetchVideoInfo()">
                <span id="fetchBtnText">Get Video Info</span>
                <span id="fetchBtnLoading" style="display: none;">
                    <span class="loading"></span>
                </span>
            </button>
            
            <div id="videoInfo" class="video-info">
                <div class="video-preview-row">
                    <img id="videoThumbnail" src="" alt="Video thumbnail">
                    <div class="video-meta">
                        <h3 id="videoTitle"></h3>
                        <p id="videoUploader"></p>
                        <p id="videoDuration"></p>
                    </div>
                </div>
                
                <div class="format-options" id="formatOptions">
                    <div class="input-group">
                        <label>Select Quality</label>
                        <div class="format-grid" id="formatGrid"></div>
                    </div>
                </div>
                
                <button class="btn btn-success" onclick="startDownload()" style="margin-top: 10px;">
                    <span id="downloadBtnText">Download Video</span>
                    <span id="downloadBtnLoading" style="display: none;">
                        <span class="loading"></span>
                    </span>
                </button>
            </div>
        </div>
        
        <div class="downloads-list">
            <div class="downloads-header">
                <h2>Downloads</h2>
            </div>
            <div id="downloadsList">
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                        <polyline points="7 10 12 15 17 10"></polyline>
                        <line x1="12" y1="15" x2="12" y2="3"></line>
                    </svg>
                    <p>No downloads yet</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        const socket = io();
        let currentVideoInfo = null;
        let selectedFormat = null;
        let activeDownloads = new Map();
        
        // Socket connection
        socket.on('connect', () => {
            console.log('Connected to server');
            loadDownloads();
        });
        
        socket.on('progress', (data) => {
            updateDownloadProgress(data.id, data.line);
        });
        
        socket.on('completed', (data) => {
            handleDownloadComplete(data.id);
        });
        
        socket.on('failed', (data) => {
            handleDownloadFailed(data.id, data.error);
        });
        
        socket.on('files_updated', () => {
            loadDownloads();
        });
        
        // Format duration
        function formatDuration(seconds) {
            if (!seconds) return 'Unknown';
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = Math.floor(seconds % 60);
            
            if (h > 0) {
                return `${h}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
            }
            return `${m}:${s.toString().padStart(2, '0')}`;
        }
        
        // Format file size
        function formatSize(bytes) {
            if (!bytes) return 'Unknown';
            const mb = bytes / (1024 * 1024);
            if (mb > 1000) {
                return (mb / 1024).toFixed(2) + ' GB';
            }
            return mb.toFixed(2) + ' MB';
        }
        
        // Fetch video info
        async function fetchVideoInfo() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                alert('Please enter a video URL');
                return;
            }
            
            const btn = document.querySelector('.btn-primary');
            const btnText = document.getElementById('fetchBtnText');
            const btnLoading = document.getElementById('fetchBtnLoading');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            
            try {
                const response = await fetch('/api/info', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to fetch video info');
                }
                
                currentVideoInfo = data;
                displayVideoInfo(data);
                
                // Fetch available formats
                fetchFormats(url);
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }
        
        // Display video info
        function displayVideoInfo(info) {
            document.getElementById('videoThumbnail').src = info.thumbnail;
            const titleEl = document.getElementById('videoTitle');
            titleEl.textContent = info.title;
            titleEl.title = info.title;
            document.getElementById('videoUploader').textContent = '📺 ' + info.uploader;
            document.getElementById('videoDuration').textContent = '⏱️ ' + formatDuration(info.duration);
            const infoEl = document.getElementById('videoInfo');
            infoEl.classList.add('show');
            // Trigger animation on next frame
            requestAnimationFrame(() => requestAnimationFrame(() => infoEl.classList.add('visible')));
        }
        
        // Fetch available formats
        async function fetchFormats(url) {
            try {
                const response = await fetch('/api/formats', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });
                
                const data = await response.json();
                
                if (response.ok && data.formats && data.formats.length > 0) {
                    displayFormats(data.formats);
                }
            } catch (error) {
                console.error('Error fetching formats:', error);
            }
        }
        
        // Display format options
        function displayFormats(formats) {
            const grid = document.getElementById('formatGrid');
            grid.innerHTML = '';
            
            // Show top 6 formats
            formats.slice(0, 6).forEach((format, index) => {
                const div = document.createElement('div');
                div.className = 'format-option' + (index === 0 ? ' selected' : '');
                div.onclick = () => selectFormat(format.format_id, div);
                
                div.innerHTML = `
                    <div class="format-resolution">${format.resolution}</div>
                    <div class="format-size">${format.filesize_mb ? format.filesize_mb + ' MB' : 'Unknown'}</div>
                `;
                
                grid.appendChild(div);
            });
            
            // Select first format by default
            if (formats.length > 0) {
                selectedFormat = formats[0].format_id;
            }
            
            document.getElementById('formatOptions').classList.add('show');
        }
        
        // Select format
        function selectFormat(formatId, element) {
            document.querySelectorAll('.format-option').forEach(el => {
                el.classList.remove('selected');
            });
            element.classList.add('selected');
            selectedFormat = formatId;
        }
        
        // Start download
        async function startDownload() {
            const url = document.getElementById('videoUrl').value.trim();
            
            if (!url) {
                alert('Please enter a video URL');
                return;
            }
            
            const btn = document.querySelector('.btn-success');
            const btnText = document.getElementById('downloadBtnText');
            const btnLoading = document.getElementById('downloadBtnLoading');
            
            btn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            
            try {
                const formatSpec = selectedFormat 
                    ? `${selectedFormat}+bestaudio/best`
                    : 'bestvideo[ext=mp4]+bestaudio[ext=m4a]/best[ext=mp4]/best';
                
                const response = await fetch('/api/start_download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url, format: formatSpec })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to start download');
                }
                
                // Subscribe to download updates
                socket.emit('subscribe', { download_id: data.download_id });
                
                // Add to active downloads
                activeDownloads.set(data.download_id, {
                    title: data.title,
                    status: 'queued',
                    percent: 0
                });
                
                // Refresh downloads list
                loadDownloads();
                
                // Reset form
                document.getElementById('videoUrl').value = '';
                const infoEl = document.getElementById('videoInfo');
                infoEl.classList.remove('show', 'visible');
                document.getElementById('formatOptions').classList.remove('show');
                currentVideoInfo = null;
                selectedFormat = null;
                
            } catch (error) {
                alert('Error: ' + error.message);
            } finally {
                btn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        }
        
        // Update download progress
        function updateDownloadProgress(id, line) {
            const item = document.getElementById(`download-${id}`);
            if (item) {
                const progressText = item.querySelector('.progress-text');
                if (progressText) {
                    progressText.querySelector('span:first-child').textContent = line.substring(0, 50);
                }
            }
        }
        
        // Handle download complete
        function handleDownloadComplete(id) {
            loadDownloads();
        }
        
        // Handle download failed
        function handleDownloadFailed(id, error) {
            activeDownloads.delete(id);
            loadDownloads();
            alert('Download failed: ' + (error || 'Unknown error'));
        }
        
        // Load downloads
        async function loadDownloads() {
            try {
                const response = await fetch('/api/downloads');
                const downloads = await response.json();
                
                const container = document.getElementById('downloadsList');
                
                if (downloads.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            <p>No downloads yet</p>
                        </div>
                    `;
                    return;
                }
                
                container.innerHTML = downloads.map(download => {
                    const statusClass = `status-${download.status}`;
                    const statusText = download.status.charAt(0).toUpperCase() + download.status.slice(1);
                    
                    let actionsHtml = '';
                    if (download.status === 'completed') {
                        actionsHtml = `
                            <div class="download-actions">
                                <button class="btn btn-success btn-small" onclick="downloadFile('${download.id}', '${download.title}')">
                                    📥 Download
                                </button>
                                <button class="btn btn-danger btn-small" onclick="deleteDownload('${download.id}')">
                                    🗑️ Delete
                                </button>
                            </div>
                        `;
                    }
                    
                    let progressHtml = '';
                    if (download.status === 'downloading' || download.status === 'queued') {
                        progressHtml = `
                            <div class="download-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${download.percent || 0}%"></div>
                                </div>
                                <div class="progress-text">
                                    <span>${download.percent || 0}%</span>
                                    <span>${download.speed || ''} ${download.eta ? '• ETA: ' + download.eta : ''}</span>
                                </div>
                            </div>
                        `;
                    }
                    
                    return `
                        <div class="download-item" id="download-${download.id}">
                            <div class="download-header">
                                <div class="download-title">${download.title}</div>
                                <div class="download-status ${statusClass}">${statusText}</div>
                            </div>
                            ${progressHtml}
                            ${download.file_size ? `<p style="color: var(--text-secondary); font-size: 11px; margin-top: 4px;">📦 ${formatSize(download.file_size)}</p>` : ''}
                            ${download.error ? `<p style="color: var(--danger); font-size: 11px; margin-top: 4px;">⚠️ ${download.error}</p>` : ''}
                            ${actionsHtml}
                        </div>
                    `;
                }).join('');
                
            } catch (error) {
                console.error('Error loading downloads:', error);
            }
        }
        
        // Download file - mobile compatible
        function downloadFile(id, title) {
            const url = `/download/${id}`;
            
            // Create a temporary anchor element
            const a = document.createElement('a');
            a.href = url;
            a.download = title + '.mp4';
            a.style.display = 'none';
            
            document.body.appendChild(a);
            a.click();
            
            // Clean up
            setTimeout(() => {
                document.body.removeChild(a);
            }, 100);
        }
        
        // Delete download
        async function deleteDownload(id) {
            if (!confirm('Are you sure you want to delete this download?')) {
                return;
            }
            
            try {
                const response = await fetch(`/api/delete/${id}`, {
                    method: 'DELETE'
                });
                
                if (response.ok) {
                    loadDownloads();
                } else {
                    alert('Failed to delete download');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
        
        // Load downloads on page load
        loadDownloads();
        
        // Refresh downloads every 5 seconds
        setInterval(loadDownloads, 5000);
        
        // Handle paste event
        document.getElementById('videoUrl').addEventListener('paste', (e) => {
            setTimeout(() => {
                const url = e.target.value.trim();
                if (url) {
                    fetchVideoInfo();
                }
            }, 100);
        });
        
        // Enter key to fetch info
        document.getElementById('videoUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                fetchVideoInfo();
            }
        });
    </script>
</body>
</html>
