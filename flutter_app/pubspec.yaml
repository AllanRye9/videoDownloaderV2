name: video_downloader
description: A Flutter frontend for the VideoDownloaderV2 backend.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  # HTTP requests
  http: ^1.2.1
  # Socket.IO real-time progress
  socket_io_client: ^2.0.3+1
  # Pretty file sizes
  filesize: ^2.0.1
  # URL launcher (open downloaded file in browser/player)
  url_launcher: ^6.2.5
  # State management (simple provider)
  provider: ^6.1.2
  # Intl for date formatting
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
